name: Run V1 History Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Import V1 session history into D1
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare migration file for D1
        run: |
          sed -i 's/PRAGMA foreign_keys = ON/PRAGMA foreign_keys = OFF/g' migrations/003_import_v1_session_history.sql
          sed -i '/^BEGIN TRANSACTION;/d' migrations/003_import_v1_session_history.sql
          sed -i '/^COMMIT;/d' migrations/003_import_v1_session_history.sql

      - name: Execute V1 history migration
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.90.0"
          command: d1 execute ltpt-v3-db --file=./migrations/003_import_v1_session_history.sql --remote
